server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由：未命中静态资源时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 智能体问答服务（FastAPI）：/api/agent/ -> agent:9001（保留完整路径）
    location /api/agent/ {
        proxy_pass http://agent:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 流式支持
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # 反向代理后端 API（/api -> backend:8080）
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 算法服务（FastAPI）：/algo/ -> algorithm:8001，并去掉 /algo 前缀
    # 例：/algo/api/data/upload  ->  http://algorithm:8001/api/data/upload
    location /algo/ {
        proxy_pass http://algorithm:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
