server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ppa-backend

  profiles:
    active: dev

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    table: flyway_schema_history

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.hollysys.ppa.module
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**
      packages-to-scan: com.hollysys.ppa.module

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true

# KG 服务（操作指导转发）
kg:
  service:
    url: http://localhost:9000

# Agent 服务
agent:
  service:
    url: http://localhost:9001

# 报警统计缓存 TTL（秒）
alarm:
  stats:
    cache-ttl: 300
