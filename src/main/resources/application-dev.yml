# =============================================
# 开发环境 — MySQL（云端）
# 使用前请修改下方的数据库连接信息
# =============================================
spring:
  flyway:
    locations: classpath:db/migration/mysql

  datasource:
    url: jdbc:mariadb://your-db-host:3306/ppa_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: your_username
    password: your_password
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 5000ms
      timeout: 5000ms

management:
  health:
    redis:
      enabled: false

logging:
  level:
    root: INFO
    com.hollysys.ppa: DEBUG
    org.springframework.web: INFO
