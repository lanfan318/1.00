# =============================================
# 生产环境 — PostgreSQL 15 + TimescaleDB
# 激活方式: spring.profiles.active: pg
# =============================================
spring:
  flyway:
    locations: classpath:db/migration/pg

  datasource:
    url: jdbc:postgresql://localhost:5432/ppa_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ppa_user
    password: ppa_pass_2024
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 5000ms
      timeout: 5000ms

logging:
  level:
    root: INFO
    com.hollysys.ppa: DEBUG
    org.springframework.web: INFO
